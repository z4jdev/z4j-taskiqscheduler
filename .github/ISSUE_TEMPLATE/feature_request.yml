name: Feature request
description: Suggest a capability for z4j-taskiqscheduler
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature for `z4j-taskiqscheduler`. Please describe
        the problem you're trying to solve, not just the solution you
        have in mind.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that z4j-taskiqscheduler does not currently support?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
